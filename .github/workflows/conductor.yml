name: Conductor - Decompose Proposal
on:
  push:
    paths: ['proposals/**.md']

jobs:
  decompose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed file
        id: files
        run: |
          echo "filename=$(git diff --name-only HEAD^ HEAD | grep 'proposals/' | head -n 1)" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install openai

      - name: Run Decomposition Script
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OLLAMA_CLOUD_API_KEY }}
          OPENAI_BASE_URL: "https://api.ollama.cloud" # <--- Double check this is your Cloud URL
        run: python .agents/scripts/decompose.py "${{ steps.files.outputs.filename }}"
