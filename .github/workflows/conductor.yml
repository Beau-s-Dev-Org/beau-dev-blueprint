name: Conductor - Decompose Proposal
on:
  push:
    paths: ['proposals/**.md']

jobs:
  decompose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed file
        id: files
        run: |
          echo "filename=$(git diff --name-only HEAD^ HEAD | grep 'proposals/' | head -n 1)" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install openai

      - name: Run Decomposition
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 1. Replace with your Ollama Cloud API Key
          OPENAI_API_KEY: ${{ secrets.OLLAMA_CLOUD_API_KEY }} 
          # 2. Add the custom Base URL for your Ollama Cloud provider
          OPENAI_BASE_URL: "https://api.ollama.cloud" # <--- Change to your actual provider URL
          DECOMP_MODEL: "llama3.1-70b" # <--- Specify the model name you want to use
